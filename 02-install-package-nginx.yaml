- name: install nginx package
  hosts: new_server #which server to install nginx package
  become: yes #to run the tasks with root privileges
  #list of tasks to execute on the server
  tasks:
  # install nginx package
  - name: install nginx package
    ansible.builtin.package:
      name: nginx
      state: present
  # start nginx service
  - name: start nginx service
    ansible.builtin.service:
    name: nginx
    state: started